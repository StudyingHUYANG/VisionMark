  <!-- 登录/注册表单 -->
  <div id="auth-form">
    <div class="header">
      <div class="logo">🚫</div>
      <div class="title">B站广告跳过</div>
      <div class="subtitle">社区驱动 · 智能标注</div>
    </div>

    <div id="error-msg" class="error"></div>

    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" placeholder="请输入用户名">
    </div>

    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="至少6位字符">
    </div>

    <button id="submit-btn">登录</button>

    <div class="switch-mode">
      还没有账号？<span id="switch-text">立即注册</span>
    </div>

    <div
      style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; font-size: 11px; color: #666;">
      测试账号：admin / admin
    </div>

  </div>

  <!-- 用户信息面板（登录后） -->
  <div id="user-panel" class="user-panel">
    <div class="user-header">
      <div class="avatar">👤</div>
      <div class="user-info">
        <h3 id="display-username">用户</h3>
        <p id="display-tier">青铜会员</p>
      </div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-value" id="display-points">0</div>
        <div class="stat-label">积分</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="display-count">0</div>
        <div class="stat-label">已标注</div>
      </div>
    </div>

    <!-- 跳过模式设置（登录后显示） -->
    <div class="skip-mode-section">
      <div class="settings-label">跳过模式</div>
      <div class="toggle-group">
        <button id="user-mode-auto" class="toggle-btn active">自动跳过</button>
        <button id="user-mode-manual" class="toggle-btn">手动跳过</button>
      </div>
      <div class="settings-hint">手动模式下会显示"跳过广告"按钮</div>
    </div>

    <button class="history-btn" id="history-btn">📊 查看标注历史</button>
    <button class="refresh-btn" id="refresh-btn">🔄 刷新数据</button>
    <button class="logout-btn" id="logout-btn">退出登录</button>
  </div>

  <script src="../content/config.local.js"></script>
  <script src="popup.js"></script>
</body>
</html>
