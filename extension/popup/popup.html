<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      max-height: 640px;
      overflow-y: auto;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1e1e2e;
      color: #fff;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .title {
      color: #FB7299;
      font-size: 16px;
      font-weight: bold;
    }

    .subtitle {
      color: #888;
      font-size: 12px;
      margin-top: 5px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      color: #aaa;
      font-size: 12px;
      margin-bottom: 5px;
    }

    input,
    select {
      width: 100%;
      padding: 10px;
      background: #333;
      border: 1px solid #555;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #FB7299;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #FB7299;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .switch-mode {
      text-align: center;
      margin-top: 15px;
      color: #888;
      font-size: 12px;
      cursor: pointer;
    }

    .switch-mode span {
      color: #FB7299;
      text-decoration: underline;
    }

    .error {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    /* 用户信息面板（登录后显示） */
    .user-panel {
      display: none;
    }

    .user-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .avatar {
      width: 50px;
      height: 50px;
      background: #FB7299;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .user-info h3 {
      margin: 0;
      font-size: 16px;
    }

    .user-info p {
      margin: 5px 0 0;
      color: #888;
      font-size: 12px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: bold;
      color: #FB7299;
    }

    .stat-label {
      font-size: 11px;
      color: #888;
      margin-top: 5px;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid #555;
      color: #888;
    }

    .logout-btn:hover {
      border-color: #ff6b6b;
      color: #ff6b6b;
    }

    .history-btn {
      background: #333;
      border: 1px solid #555;
      color: #fff;
      margin-top: 10px;
    }

    .history-btn:hover {
      background: #444;
    }

    /* 二级操作按钮样式 */
    .panel-action-btn {
      background: #444;
      border: 1px solid #666;
      color: #fff;
      margin-top: 10px;
      padding: 8px 12px;
      font-size: 12px;
      width: auto;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .panel-action-btn:hover {
      background: #555;
    }

    /* 跳过模式 Toggle */
    .skip-mode-section {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .settings-label {
      color: #aaa;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .toggle-group {
      display: flex;
      gap: 8px;
    }
    .toggle-btn {
      flex: 1;
      padding: 8px;
      background: #333;
      border: 1px solid #555;
      border-radius: 4px;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .toggle-btn:hover {
      background: #444;
    }

    .toggle-btn.active {
      background: #FB7299;
      border-color: #FB7299;
    }
    .settings-hint {
      color: #666;
      font-size: 11px;
      margin-top: 8px;
      text-align: center;
    }

    .model-config-panel {
      display: none;
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .panel-back {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border-radius: 10px;
      background: #2d2d3c;
      border: 1px solid #4b4b60;
      color: #fff;
      font-size: 18px;
      line-height: 1;
      padding: 0;
    }

    .panel-back:hover {
      background: #38384a;
    }

    .panel-copy {
      flex: 1;
      min-width: 0;
    }

    .panel-title {
      color: #FB7299;
      font-size: 16px;
      font-weight: 700;
    }

    .panel-subtitle {
      color: #888;
      font-size: 12px;
      margin-top: 5px;
      line-height: 1.5;
    }

    .panel-status-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .panel-status-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 12px;
    }

    .panel-status-label {
      display: block;
      color: #888;
      font-size: 11px;
      margin-bottom: 6px;
    }

    .panel-status-value {
      display: block;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.4;
    }

    .panel-status-meta {
      display: block;
      color: #aaa;
      font-size: 11px;
      margin-top: 4px;
    }

    .panel-feedback {
      display: none;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      border: 1px solid transparent;
    }

    .panel-feedback--info {
      display: block;
      color: #b8d4ff;
      background: rgba(25, 118, 210, 0.14);
      border-color: rgba(25, 118, 210, 0.22);
    }

    .panel-feedback--success {
      display: block;
      color: #a7f3d0;
      background: rgba(16, 185, 129, 0.14);
      border-color: rgba(16, 185, 129, 0.24);
    }

    .panel-feedback--error {
      display: block;
      color: #fecaca;
      background: rgba(239, 68, 68, 0.14);
      border-color: rgba(239, 68, 68, 0.24);
    }

    .panel-inline-hint {
      color: #888;
      font-size: 11px;
      margin-top: 6px;
      line-height: 1.5;
    }

    .panel-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 8px;
      margin-right: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #ddd;
      font-size: 11px;
      font-weight: 700;
    }

    .panel-badge.active {
      background: rgba(251, 114, 153, 0.18);
      color: #ffd7e4;
    }

    .panel-switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      margin-bottom: 16px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .panel-switch-copy {
      flex: 1;
      min-width: 0;
    }

    .panel-switch-title {
      color: #fff;
      font-size: 13px;
      font-weight: 600;
    }

    .panel-switch-hint {
      color: #888;
      font-size: 11px;
      line-height: 1.5;
      margin-top: 4px;
    }

    .switch-control {
      position: relative;
      width: 52px;
      height: 30px;
      flex-shrink: 0;
      padding: 0;
      border-radius: 999px;
      background: #555;
      border: none;
    }

    .switch-control.active {
      background: linear-gradient(135deg, #FB7299, #ff98b1);
    }

    .switch-thumb {
      position: absolute;
      top: 3px;
      left: 4px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s ease;
    }

    .switch-control.active .switch-thumb {
      transform: translateX(20px);
    }

    .panel-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .panel-actions .secondary {
      background: #333;
      border: 1px solid #555;
      color: #fff;
    }

    .panel-actions .secondary:hover {
      background: #444;
    }
  </style>
</head>

<body>
  <!-- 登录/注册表单 -->
  <div id="auth-form">
    <div class="header">
      <div class="logo">🚫</div>
      <div class="title">B站视频分段评价</div>
      <div class="subtitle">社区驱动 · 智能标注</div>
    </div>

    <div id="error-msg" class="error"></div>

    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" placeholder="请输入用户名">
    </div>

    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="至少6位字符">
    </div>

    <button id="submit-btn">登录</button>

    <div class="switch-mode">
      还没有账号？<span id="switch-text">立即注册</span>
    </div>

    <div
      style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; font-size: 11px; color: #666;">
      测试账号：admin / admin
    </div>

  </div>

  <!-- 用户信息面板（登录后） -->
  <div id="user-panel" class="user-panel">
    <div class="user-header">
      <div class="avatar">👤</div>
      <div class="user-info">
        <h3 id="display-username">用户</h3>
        <p id="display-tier">青铜会员</p>
      </div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-value" id="display-points">0</div>
        <div class="stat-label">积分</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="display-count">0</div>
        <div class="stat-label">已标注</div>
      </div>
    </div>

    <!-- 跳过模式设置（登录后显示） -->
    <div class="skip-mode-section">
      <div class="settings-label">跳过模式</div>
      <div class="toggle-group">
        <button id="user-mode-auto" class="toggle-btn active">自动跳过</button>
        <button id="user-mode-manual" class="toggle-btn">手动跳过</button>
      </div>
      <div class="settings-hint">手动模式下会显示"跳过分段"按钮</div>
    </div>

    <button class="history-btn" id="history-btn">📊 查看标注历史</button>
    <button class="panel-action-btn" id="model-config-btn">⚙️ 自定义API</button>
    <button class="logout-btn" id="logout-btn">退出登录</button>
  </div>

  <div id="model-config-panel" class="model-config-panel">
    <div class="panel-header">
      <button class="panel-back" id="model-config-back" type="button" aria-label="返回">‹</button>
      <div class="panel-copy">
        <div class="panel-title">自定义 API</div>
      </div>
    </div>

    <div class="panel-status-grid">
      <div class="panel-status-card">
        <span class="panel-status-label">配置状态</span>
        <strong class="panel-status-value" id="model-config-status">未配置</strong>
        <span class="panel-status-meta" id="model-config-status-meta"></span>
      </div>
      <div class="panel-status-card">
        <span class="panel-status-label">API Key</span>
        <strong class="panel-status-value" id="model-api-key-status">未配置</strong>
      </div>
      <div class="panel-status-card">
        <span class="panel-status-label">当前生效</span>
        <strong class="panel-status-value" id="model-effective-source">暂无可用配置</strong>
      </div>
    </div>

    <div id="model-config-feedback" class="panel-feedback"></div>

    <div class="form-group">
      <label for="model-provider">Provider</label>
      <select id="model-provider">
        <option value="qwen">Qwen</option>
      </select>
    </div>

    <div class="form-group">
      <label for="model-base-url">Base URL</label>
      <input type="text" id="model-base-url" placeholder="https://dashscope.aliyuncs.com/compatible-mode/v1">
    </div>

    <div class="form-group">
      <label for="model-name">Model Name</label>
      <input type="text" id="model-name" placeholder="qwen-vl-max">
    </div>

    <div class="form-group">
      <label for="model-api-key">API Key</label>
      <input type="password" id="model-api-key" placeholder="请输入 API Key" autocomplete="new-password">
      <div class="panel-inline-hint">
        <span class="panel-badge" id="model-api-key-badge">未配置</span>
        <span id="model-api-key-hint">首次保存前必须填写 API Key。</span>
      </div>
    </div>

    <div class="panel-switch-row">
      <div class="panel-switch-copy">
        <div class="panel-switch-title">启用当前配置</div>
        <div class="panel-switch-hint">关闭后会保留你的设置，但运行时会回退系统默认配置。</div>
      </div>
      <button id="model-enabled-toggle" class="switch-control active" type="button" role="switch" aria-checked="true">
        <span class="switch-thumb"></span>
      </button>
    </div>

    <div class="panel-actions">
      <button id="model-test-btn" class="secondary" type="button">测试连接</button>
      <button id="model-save-btn" type="button">保存配置</button>
    </div>
  </div>

  <script src="../content/config.local.js"></script>
  <script src="popup.js"></script>
</body>

</html>
